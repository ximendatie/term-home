<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>term-home core</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="top-layer">
      <div class="pill">
        <span class="dot" id="status-dot"></span>
        <strong id="status-text">等待任务</strong>
        <span id="status-summary">尚未收到事件</span>
      </div>
    </div>

    <main class="container">
      <header>
        <h1>term-home · Core MVP</h1>
        <p>统一事件总线 + 顶部状态层（Notch 风格）</p>
      </header>

      <section>
        <h2>任务列表</h2>
        <div id="tasks" class="tasks"></div>
      </section>
    </main>

    <script>
      const tasksEl = document.getElementById('tasks');
      const statusText = document.getElementById('status-text');
      const statusSummary = document.getElementById('status-summary');
      const statusDot = document.getElementById('status-dot');

      const palette = {
        running: '#60a5fa',
        completed: '#34d399',
        failed: '#f87171',
        cancelled: '#fbbf24',
        awaiting_approval: '#c084fc',
      };

      async function postAction(taskId, action) {
        await fetch(`/tasks/${taskId}/actions`, {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ action }),
        });
      }

      function render(tasks) {
        if (!tasks.length) {
          tasksEl.innerHTML = '<p class="muted">暂无任务</p>';
          statusText.textContent = '等待任务';
          statusSummary.textContent = '尚未收到事件';
          statusDot.style.background = '#9ca3af';
          return;
        }

        const top = tasks[0];
        statusText.textContent = `${top.title} · ${top.status}`;
        statusSummary.textContent = top.summary || '无摘要';
        statusDot.style.background = palette[top.status] || '#9ca3af';

        tasksEl.innerHTML = tasks
          .map(
            (t) => `
              <article class="task">
                <div class="task-main">
                  <h3>${t.title}</h3>
                  <p>${t.summary || '无摘要'}</p>
                  <small>${t.source} · ${new Date(t.updated_at * 1000).toLocaleTimeString()}</small>
                </div>
                <div class="task-meta">
                  <span class="badge" style="background:${palette[t.status] || '#9ca3af'}22;color:${palette[t.status] || '#9ca3af'}">${t.status}</span>
                  <div class="actions">
                    <button onclick="postAction('${t.task_id}','stop')">stop</button>
                    <button onclick="postAction('${t.task_id}','retry')">retry</button>
                    <button onclick="postAction('${t.task_id}','approve')">approve</button>
                    <button onclick="postAction('${t.task_id}','reject')">reject</button>
                  </div>
                </div>
              </article>
            `
          )
          .join('');
      }

      const es = new EventSource('/stream');
      es.addEventListener('snapshot', (e) => {
        const d = JSON.parse(e.data);
        render(d.tasks || []);
      });
      es.onmessage = (e) => {
        const d = JSON.parse(e.data);
        fetch('/tasks').then((r) => r.json()).then((x) => render(x.tasks || []));
      };
      es.onerror = () => {
        statusSummary.textContent = '连接中断，自动重试中';
      };
    </script>
  </body>
</html>
